<!doctype html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>งานของฉัน - ระบบติดตามการส่งงานครู</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts: Sarabun -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">


    <script src="../js/navbar.js"></script>
    <script src="../js/footer.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/sidebar.js"></script>
</head>

<body class="bg-gray-50 md:pl-72">
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div><!-- Navigation -->
    <nav class="bg-white shadow-md" id="mainNav">
        <div class="container mx-auto px-4">
            <div class="flex gap-2 py-3" id="navButtons"></div>
        </div>
    </nav><!-- Main Content -->
    <main class="container mx-auto px-4 py-6 flex-grow">
        <div id="myTasksPage">
            <h2 class="text-3xl font-bold mb-6 text-gray-800">งานของฉัน</h2><!-- Summary Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="glass-card p-6 border-b-4 border-blue-500">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">งานทั้งหมด</p>
                            <p class="text-3xl font-bold text-gray-800" id="myTotalTasks">0</p>
                        </div>
                        <i class="fas fa-tasks text-4xl text-blue-500"></i>
                    </div>
                </div>
                <div class="glass-card p-6 border-b-4 border-green-500">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">ส่งแล้ว</p>
                            <p class="text-3xl font-bold text-green-600" id="mySubmittedTasks">0</p>
                        </div>
                        <i class="fas fa-check-circle text-4xl text-green-500"></i>
                    </div>
                </div>
                <div class="glass-card p-6 border-b-4 border-orange-500">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">ค้างส่ง/ต้องแก้ไข</p>
                            <p class="text-3xl font-bold text-red-600" id="myPendingTasks">0</p>
                        </div>
                        <i class="fas fa-exclamation-circle text-4xl text-red-500"></i>
                    </div>
                </div>
            </div><!-- Filter Buttons -->
            <div class="flex justify-center flex-wrap gap-2 mb-8" id="myTasksFilter">
                <button data-status="all"
                    class="task-filter-btn bg-blue-600 text-white px-5 py-2 rounded-full font-semibold transition shadow-md">ทั้งหมด</button>
                <button data-status="pending"
                    class="task-filter-btn bg-white text-gray-700 px-5 py-2 rounded-full font-semibold transition hover:bg-gray-100 shadow-sm">ค้างส่ง/แก้ไข</button>
                <button data-status="review"
                    class="task-filter-btn bg-white text-gray-700 px-5 py-2 rounded-full font-semibold transition hover:bg-gray-100 shadow-sm">รอตรวจสอบ</button>
                <button data-status="submitted"
                    class="task-filter-btn bg-white text-gray-700 px-5 py-2 rounded-full font-semibold transition hover:bg-gray-100 shadow-sm">ส่งแล้ว</button>
            </div>
            <!-- Tasks List -->
            <div id="myTasksList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Task cards will be injected here -->
            </div>
        </div>
    </main>
    <script src="js/my-tasks.js"></script>
</body>

</html>
