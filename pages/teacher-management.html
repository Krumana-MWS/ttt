<!doctype html>
<html lang="th">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการบุคลากร - ระบบติดตามการส่งงานครู</title> 
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Google Fonts: Sarabun -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  
  <script src="../js/navbar.js"></script>
  <script src="../js/footer.js"></script>
  <script src="../js/common.js"></script>
  <script src="../js/sidebar.js"></script>
 </head>
 <body class="bg-gray-50 md:pl-72">
  <div class="loading-overlay" id="loadingOverlay">
   <div class="spinner"></div>
  </div>

  <!-- Navigation -->
  <nav class="bg-white shadow-md" id="mainNav">
   <div class="container mx-auto px-4">
    <div class="flex gap-2 py-3" id="navButtons"></div>
   </div>
  </nav>

  <!-- Main Content (flex-grow pushes footer down) -->
  <main class="container mx-auto px-4 py-6 flex-grow">
   <!-- Teacher Management Page -->
   <div id="teacherManagementPage">
    <div class="flex justify-between items-center mb-6">
     <h2 class="text-3xl font-bold text-gray-800">จัดการบุคลากร</h2>
     <div>
      <button onclick="exportTeachersToCSV()" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-3 rounded-lg font-semibold transition mr-2">
       <i class="fas fa-file-export mr-2"></i>ส่งออกข้อมูล
      </button>
      <button onclick="showImportTeacherModal()" class="btn-premium bg-indigo-600 text-white px-6 py-3 rounded-lg font-semibold transition mr-2">
       <i class="fas fa-file-import mr-2"></i>นำเข้าข้อมูล
      </button>
      <button onclick="showAddTeacherModal()" class="btn-premium bg-emerald-600 text-white px-6 py-3 rounded-lg font-semibold transition">
       <i class="fas fa-plus mr-2"></i>เพิ่มบุคลากร
      </button>
     </div>
    </div>
    
    <!-- Summary Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
     <div class="glass-card p-6">
      <div class="flex items-center justify-between">
       <div>
        <p class="text-gray-500 text-sm">จำนวนครูทั้งหมด</p>
        <p class="text-3xl font-bold text-gray-800" id="totalTeachers">0</p>
       </div><i class="fas fa-users text-4xl text-blue-500"></i>
      </div>
     </div>
     <div class="glass-card p-6">
      <div class="flex items-center justify-between">
       <div>
        <p class="text-gray-500 text-sm">กลุ่มสาระฯ</p>
        <p class="text-3xl font-bold text-gray-800" id="totalDepartments">0</p>
       </div><i class="fas fa-building text-4xl text-green-500"></i>
      </div>
     </div>
    </div>
    
    <!-- Search -->
    <div class="glass-card p-6 mb-6">
     <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <input type="text" id="searchTeacher" placeholder="ค้นหาชื่อครู" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      <select id="filterTeacherDepartment" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
       <option value="">ทุกกลุ่มสาระฯ</option>
      </select>
     </div>
    </div>
    
    <!-- Teachers Table -->
    <div class="glass-card overflow-hidden">
     <div class="overflow-x-auto">
      <table class="w-full">
       <thead class="bg-gray-100">
        <tr>
         <th class="px-6 py-3 text-left text-xs font-bold text-gray-700 uppercase">รหัสครู</th>
         <th class="px-6 py-3 text-left text-xs font-bold text-gray-700 uppercase">ชื่อ-นามสกุล</th>
         <th class="px-6 py-3 text-left text-xs font-bold text-gray-700 uppercase">อีเมล</th>
         <th class="px-6 py-3 text-left text-xs font-bold text-gray-700 uppercase">กลุ่มสาระฯ</th>
         <th class="px-6 py-3 text-left text-xs font-bold text-gray-700 uppercase">ตำแหน่ง</th>
         <th class="px-6 py-3 text-left text-xs font-bold text-gray-700 uppercase">สถานะงาน</th>
         <th class="px-6 py-3 text-left text-xs font-bold text-gray-700 uppercase">การกระทำ</th>
        </tr>
       </thead>
       <tbody id="teachersTableBody"></tbody>
      </table>
     </div>
    </div>
   </div>
  </main>


  <!-- Modals -->
  <div id="modalContainer"></div>
  <script src="js/teacher-management.js"></script>
 </body>
</html>
